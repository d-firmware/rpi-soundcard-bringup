# /etc/asound.conf — ALSA configuration for PCM5102A DAC
#
# This file configures ALSA to:
#   1. Set the PCM5102A card as the default output device
#   2. Enable software resampling (plug plugin) for format flexibility
#   3. Route dmix for multi-application audio sharing
#
# After placing this file at /etc/asound.conf, verify with:
#   aplay -l                         # list all sound cards
#   aplay -D default test.wav        # play via default device
#   speaker-test -D default -t sine  # sine wave test

# ── Default PCM device ──────────────────────────────────────────────────────
# 'plughw' enables automatic format/rate conversion by ALSA.
# Use 'hw' if you want strict pass-through (no software conversion).
pcm.!default {
    type plug
    slave.pcm "dmixed"
}

# ── dmix: software mixer for multi-app sharing ───────────────────────────────
# PCM5102A supports up to 384kHz; we use 48000 as a safe default.
# Adjust rate to 96000 or 192000 if your audio source warrants it.
pcm.dmixed {
    type dmix
    ipc_key 1024
    ipc_key_add_uid true         # per-user IPC key — avoids conflicts
    slave {
        pcm "hw:sndrpii2scard,0"
        rate        48000
        channels    2
        format      S32_LE       # PCM5102A best quality: 32-bit signed LE
        period_size 1024         # ~21ms latency at 48kHz
        buffer_size 8192
    }
    bindings {
        0 0                      # left  channel → hw channel 0
        1 1                      # right channel → hw channel 1
    }
}

# ── Control element (for mixer apps like alsamixer) ──────────────────────────
ctl.!default {
    type hw
    card sndrpii2scard
}

# ── Named device alias: allows aplay -D pcm5102a ... ─────────────────────────
pcm.pcm5102a {
    type plug
    slave {
        pcm "hw:sndrpii2scard,0"
        rate   48000
        format S32_LE
    }
}
